[tasks.fix]
description = "Format, fix, and check the entire codebase."
run = [
  "uv run ruff check --fix",
  "uv run ruff format",
  "uv run ty check",
]

[tasks.test]
description = "Run the test suite with pytest."
run = [
  "uv run pytest",
]

[tasks.test-cov]
description = "Run the test suite with coverage report."
run = [
  "uv run pytest --run-model --cov=server --cov-report=term-missing",
]

[tasks.test-all]
description = "Run the test suite across Python 3.10–3.14."
run = [
  "uv run --python 3.10 pytest --run-model",
  "uv run --python 3.11 pytest --run-model",
  "uv run --python 3.12 pytest --run-model",
  "uv run --python 3.13 pytest --run-model",
  "uv run --python 3.14 pytest --run-model",
]
